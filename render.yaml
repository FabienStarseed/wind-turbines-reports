services:
  - type: web
    name: bdda
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: KIMI_API_KEY
        sync: false
      - key: BDDA_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
