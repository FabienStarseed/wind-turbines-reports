<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AWID — Inspection Dashboard</title>

  <!-- Tailwind Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:      '#050510',
            cyan:    '#00F5FF',
            green:   '#00FF88',
            magenta: '#FF006E',
            amber:   '#FFB800',
            purple:  '#7B2FFF',
          },
          fontFamily: {
            bebas: ['"Bebas Neue"', 'cursive'],
            mono:  ['"JetBrains Mono"', '"DM Mono"', 'monospace'],
            syne:  ['Syne', 'sans-serif'],
          },
        },
      },
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Alpine.js v3 -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>

<body x-data="app()" x-init="init()" x-cloak class="bg-[#050510] min-h-screen text-white">

  <!-- Scanlines overlay -->
  <div class="scanlines"></div>

  <!-- ── HEADER ──────────────────────────────────────────────────────────── -->
  <header class="fixed top-0 left-0 right-0 h-16 z-[100] flex items-center px-6 border-b border-white/[0.06]"
          style="background: rgba(5,5,20,0.85); backdrop-filter: blur(12px);">

    <!-- Left: Brand -->
    <div class="flex items-baseline gap-3 min-w-[160px]">
      <span class="font-bebas text-3xl leading-none bg-gradient-to-r from-[#00F5FF] to-[#7B2FFF] bg-clip-text text-transparent">AWID</span>
      <span class="font-mono text-[9px] text-white/30 tracking-widest uppercase hidden sm:block">APAC WIND INSPECTIONS DRONES</span>
    </div>

    <!-- Center: Tab Nav -->
    <nav class="flex-1 flex justify-center gap-1">
      <button @click="activeTab='new-inspection'"
              class="font-mono text-xs uppercase tracking-widest px-4 py-5 border-b-2 transition-colors"
              :class="activeTab==='new-inspection' ? 'border-[#FFB800] text-[#FFB800]' : 'border-transparent text-white/40 hover:text-white/70'">
        NEW INSPECTION
      </button>
      <button @click="activeTab='history'; if(!historyLoaded) loadHistory()"
              class="font-mono text-xs uppercase tracking-widest px-4 py-5 border-b-2 transition-colors"
              :class="activeTab==='history' ? 'border-[#FFB800] text-[#FFB800]' : 'border-transparent text-white/40 hover:text-white/70'">
        HISTORY
      </button>
    </nav>

    <!-- Right: User + Logout -->
    <div class="flex items-center gap-3 min-w-[160px] justify-end">
      <span class="font-mono text-xs text-[#00F5FF]" x-text="username"></span>
      <button @click="logout()" class="action-btn sm amber">LOGOUT</button>
    </div>
  </header>

  <!-- ── MAIN CONTENT ──────────────────────────────────────────────────── -->
  <main class="pt-16 max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <!-- NEW INSPECTION TAB -->
    <div x-show="activeTab==='new-inspection'">
      <div class="grid grid-cols-1 lg:grid-cols-5 gap-8">

        <!-- ── FORM COLUMN (3/5) ────────────────────────────────────────── -->
        <div class="lg:col-span-3">
          <form @submit.prevent="submit()" enctype="multipart/form-data">

            <!-- SECTION 1: TURBINE IDENTITY -->
            <div class="flex items-center gap-3 cursor-pointer select-none mb-4 mt-2"
                 @click="sections.identity = !sections.identity">
              <div class="h-px flex-1 bg-[#00F5FF]/15"></div>
              <span class="font-mono text-[10px] text-[#00F5FF]/60 uppercase tracking-widest">TURBINE IDENTITY</span>
              <div class="h-px flex-1 bg-[#00F5FF]/15"></div>
              <span class="font-mono text-[10px] text-white/25 ml-1" x-text="sections.identity ? '▼' : '▶'"></span>
            </div>
            <div x-show="sections.identity" x-transition>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-x-4">
                <div class="mb-4">
                  <label class="block font-mono text-[10px] text-white/50 uppercase tracking-wider mb-1">Turbine ID <span class="text-[#FF006E]">*</span></label>
                  <input type="text" name="turbine_id" placeholder="JAP19" required class="cyber-input w-full">
                </div>
                <div class="mb-4">
                  <label class="block font-mono text-[10px] text-white/50 uppercase tracking-wider mb-1">Turbine Model <span class="text-[#FF006E]">*</span></label>
                  <input type="text" name="turbine_model" placeholder="Vestas V150-4.5" required class="cyber-input w-full">
                </div>
                <div class="mb-4">
                  <label class="block font-mono text-[10px] text-white/50 uppercase tracking-wider mb-1">Site Name <span class="text-[#FF006E]">*</span></label>
                  <input type="text" name="site_name" placeholder="Akita Offshore Wind" required class="cyber-input w-full">
                </div>
                <div class="mb-4">
                  <label class="block font-mono text-[10px] text-white/50 uppercase tracking-wider mb-1">Country <span class="text-[#FF006E]">*</span></label>
                  <select name="country" required class="cyber-input w-full">
                    <option value="">— Select —</option>
                    <option>Japan</option>
                    <option>Philippines</option>
                    <option>Taiwan</option>
                    <option>Australia</option>
                    <option>Vietnam</option>
                    <option>Other</option>
                  </select>
                </div>
              </div>
              <div class="grid grid-cols-3 gap-x-4 mb-4">
                <div>
                  <label class="block font-mono text-[10px] text-white/50 uppercase tracking-wider mb-1">Hub Height (m)</label>
                  <input type="number" name="hub_height_m" placeholder="120" step="0.1" class="cyber-input w-full">
                </div>
                <div>
                  <label class="block font-mono text-[10px] text-white/50 uppercase tracking-wider mb-1">Rotor Diam (m)</label>
                  <input type="number" name="rotor_diameter_m" placeholder="150" step="0.1" class="cyber-input w-full">
                </div>
                <div>
                  <label class="block font-mono text-[10px] text-white/50 uppercase tracking-wider mb-1">Blade Length (m)</label>
                  <input type="number" name="blade_length_m" placeholder="73" step="0.1" class="cyber-input w-full">
                </div>
              </div>
              <div class="grid grid-cols-2 gap-x-4 mb-4">
                <div>
                  <label class="block font-mono text-[10px] text-white/50 uppercase tracking-wider mb-1">GPS Latitude</label>
                  <input type="text" name="gps_lat" placeholder="39.7192" class="cyber-input w-full">
                </div>
                <div>
                  <label class="block font-mono text-[10px] text-white/50 uppercase tracking-wider mb-1">GPS Longitude</label>
                  <input type="text" name="gps_lon" placeholder="140.1023" class="cyber-input w-full">
                </div>
              </div>
            </div>

            <!-- SECTION 2: INSPECTION DETAILS -->
            <div class="flex items-center gap-3 cursor-pointer select-none mb-4 mt-6"
                 @click="sections.details = !sections.details">
              <div class="h-px flex-1 bg-[#00F5FF]/15"></div>
              <span class="font-mono text-[10px] text-[#00F5FF]/60 uppercase tracking-widest">INSPECTION DETAILS</span>
              <div class="h-px flex-1 bg-[#00F5FF]/15"></div>
              <span class="font-mono text-[10px] text-white/25 ml-1" x-text="sections.details ? '▼' : '▶'"></span>
            </div>
            <div x-show="sections.details" x-transition>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-x-4">
                <div class="mb-4">
                  <label class="block font-mono text-[10px] text-white/50 uppercase tracking-wider mb-1">Inspector Name <span class="text-[#FF006E]">*</span></label>
                  <input type="text" name="inspector_name" placeholder="Tanaka Hiroshi" required class="cyber-input w-full">
                </div>
                <div class="mb-4">
                  <label class="block font-mono text-[10px] text-white/50 uppercase tracking-wider mb-1">Inspection Date <span class="text-[#FF006E]">*</span></label>
                  <input type="date" name="inspection_date" required class="cyber-input w-full">
                </div>
                <div class="mb-4 sm:col-span-2">
                  <label class="block font-mono text-[10px] text-white/50 uppercase tracking-wider mb-1">Drone Model</label>
                  <input type="text" name="drone_model" value="DJI Matrice 300 RTK" class="cyber-input w-full">
                </div>
              </div>
            </div>

            <!-- SECTION 3: ENVIRONMENTAL CONDITIONS -->
            <div class="flex items-center gap-3 cursor-pointer select-none mb-4 mt-6"
                 @click="sections.environment = !sections.environment">
              <div class="h-px flex-1 bg-[#00F5FF]/15"></div>
              <span class="font-mono text-[10px] text-[#00F5FF]/60 uppercase tracking-widest">ENVIRONMENTAL CONDITIONS</span>
              <div class="h-px flex-1 bg-[#00F5FF]/15"></div>
              <span class="font-mono text-[10px] text-white/25 ml-1" x-text="sections.environment ? '▼' : '▶'"></span>
            </div>
            <div x-show="sections.environment" x-transition>
              <div class="grid grid-cols-2 sm:grid-cols-4 gap-x-4 mb-4">
                <div>
                  <label class="block font-mono text-[10px] text-white/50 uppercase tracking-wider mb-1">Weather</label>
                  <input type="text" name="weather" placeholder="Partly cloudy" class="cyber-input w-full">
                </div>
                <div>
                  <label class="block font-mono text-[10px] text-white/50 uppercase tracking-wider mb-1">Wind (m/s)</label>
                  <input type="number" name="wind_speed_ms" placeholder="4.2" step="0.1" min="0" class="cyber-input w-full">
                </div>
                <div>
                  <label class="block font-mono text-[10px] text-white/50 uppercase tracking-wider mb-1">Temp (°C)</label>
                  <input type="number" name="temperature_c" placeholder="18" step="0.1" class="cyber-input w-full">
                </div>
                <div>
                  <label class="block font-mono text-[10px] text-white/50 uppercase tracking-wider mb-1">Visibility (km)</label>
                  <input type="number" name="visibility_km" placeholder="15" step="0.1" min="0" class="cyber-input w-full">
                </div>
              </div>
            </div>

            <!-- SECTION 4: INSPECTION NOTES -->
            <div class="flex items-center gap-3 cursor-pointer select-none mb-4 mt-6"
                 @click="sections.notes = !sections.notes">
              <div class="h-px flex-1 bg-[#00F5FF]/15"></div>
              <span class="font-mono text-[10px] text-[#00F5FF]/60 uppercase tracking-widest">INSPECTION NOTES</span>
              <div class="h-px flex-1 bg-[#00F5FF]/15"></div>
              <span class="font-mono text-[10px] text-white/25 ml-1" x-text="sections.notes ? '▼' : '▶'"></span>
            </div>
            <div x-show="sections.notes" x-transition>
              <div class="mb-4">
                <textarea name="notes" rows="3" class="cyber-input w-full resize-none"
                          placeholder="Limitations, blade access issues, weather notes…"></textarea>
              </div>
            </div>

            <!-- SECTION 5: UPLOAD IMAGES -->
            <div class="flex items-center gap-3 cursor-pointer select-none mb-4 mt-6"
                 @click="sections.upload = !sections.upload">
              <div class="h-px flex-1 bg-[#00F5FF]/15"></div>
              <span class="font-mono text-[10px] text-[#00F5FF]/60 uppercase tracking-widest">UPLOAD IMAGES</span>
              <div class="h-px flex-1 bg-[#00F5FF]/15"></div>
              <span class="font-mono text-[10px] text-white/25 ml-1" x-text="sections.upload ? '▼' : '▶'"></span>
            </div>
            <div x-show="sections.upload" x-transition>
              <div class="relative border-2 border-dashed rounded-sm transition-colors mt-1"
                   :class="fileSelected ? 'border-[#00FF88] bg-[#00FF88]/5' : 'border-white/10 bg-white/[0.02]'"
                   @dragover.prevent
                   @drop.prevent="handleDrop($event)">
                <input type="file" name="images" id="fileInput" accept=".zip,.jpg,.jpeg,.png" required
                       class="absolute inset-0 opacity-0 cursor-pointer w-full h-full"
                       @change="handleFileChange($event)">
                <template x-if="!fileSelected">
                  <div class="text-center py-10 pointer-events-none">
                    <div class="text-3xl mb-3">📁</div>
                    <div class="font-mono text-xs text-white/40 uppercase tracking-wider">DROP ZIP OR CLICK TO SELECT</div>
                    <div class="font-mono text-[10px] text-white/20 mt-1">ZIP (DJI folder) · JPG · PNG</div>
                  </div>
                </template>
                <template x-if="fileSelected">
                  <div class="flex items-center gap-3 py-5 px-5 pointer-events-none">
                    <span class="text-[#00FF88] font-mono">✓</span>
                    <div>
                      <div class="font-mono text-sm text-[#00FF88]" x-text="fileName"></div>
                      <div class="font-mono text-[10px] text-white/30 mt-0.5" x-text="fileSize"></div>
                    </div>
                  </div>
                </template>
              </div>
            </div>

            <!-- SUBMIT -->
            <button type="submit" class="action-btn mt-6 w-full justify-center"
                    :disabled="submitting" :style="submitting ? 'opacity:0.45' : ''">
              <span x-show="!submitting">▶ GENERATE INSPECTION REPORT</span>
              <span x-show="submitting">UPLOADING…</span>
            </button>

          </form>
        </div>

        <!-- ── PROGRESS COLUMN (2/5) ─────────────────────────────────────── -->
        <div class="lg:col-span-2">

          <!-- Empty state -->
          <template x-if="!jobId">
            <div class="border border-white/[0.06] p-6 text-center mt-2">
              <div class="font-mono text-xs text-white/20 uppercase tracking-widest">NO INSPECTIONS YET</div>
              <div class="font-mono text-[32px] text-white/10 mt-2">–</div>
            </div>
          </template>

          <!-- Active / complete / error job panel -->
          <template x-if="jobId">
            <div class="border border-white/[0.06] p-5">

              <!-- Job ID header -->
              <div class="font-mono text-[10px] text-white/30 uppercase tracking-wider mb-4"
                   x-text="'JOB ' + jobId?.slice(0,8).toUpperCase()"></div>

              <!-- Stage dots -->
              <div class="space-y-2 mb-5">
                <template x-for="(s, i) in stages" :key="s.key">
                  <div class="flex items-center gap-3">
                    <div class="w-2 h-2 rounded-full flex-shrink-0 transition-colors"
                         :class="{
                           'bg-[#00FF88]': isDone(i),
                           'bg-[#FFB800] pulse': isActive(i),
                           'bg-[#FF006E]': isFailed(i),
                           'bg-white/15': isPending(i),
                         }"></div>
                    <span class="font-mono text-xs uppercase tracking-wide transition-colors"
                          :class="{
                            'text-[#00FF88]': isDone(i),
                            'text-[#FFB800]': isActive(i),
                            'text-[#FF006E]': isFailed(i),
                            'text-white/25': isPending(i),
                          }">
                      <span x-text="s.label"></span>
                      <span x-show="isDone(i)" class="ml-1">✓</span>
                      <span x-show="isFailed(i)" class="ml-1">✗</span>
                    </span>
                  </div>
                </template>
              </div>

              <!-- Progress bar -->
              <div class="h-[4px] w-full bg-white/10 overflow-hidden mb-3">
                <div class="h-full transition-all duration-700"
                     :style="`width: ${progress}%; background: ${progress >= 100 ? 'var(--green)' : 'linear-gradient(90deg, var(--amber), var(--cyan))'}`">
                </div>
              </div>

              <!-- Status message -->
              <div class="font-mono text-xs text-white/40 mb-4" x-text="message || stage || '—'"></div>

              <!-- Stats row -->
              <div x-show="totalImages || flaggedImages || criticalFindings" class="flex gap-4 mb-4">
                <template x-if="totalImages">
                  <span class="font-mono text-xs text-white/50"><span x-text="totalImages"></span> IMAGES</span>
                </template>
                <template x-if="flaggedImages">
                  <span class="font-mono text-xs text-[#FFB800]"><span x-text="flaggedImages"></span> FLAGGED</span>
                </template>
                <template x-if="criticalFindings">
                  <span class="font-mono text-xs text-[#FF006E]"><span x-text="criticalFindings"></span> CRITICAL</span>
                </template>
              </div>

              <!-- COMPLETE state -->
              <div x-show="stage === 'complete'" class="space-y-3">
                <div class="font-mono text-xs text-[#00FF88] tracking-widest uppercase pulse text-center py-2 border border-[#00FF88]/30 bg-[#00FF88]/8">
                  ✓ INSPECTION COMPLETE
                </div>
                <button class="action-btn w-full justify-center" @click="downloadReport(jobId)">
                  ⬇ DOWNLOAD REPORT PDF
                </button>
                <label class="flex items-center gap-2 font-mono text-[10px] text-white/35 cursor-pointer">
                  <input type="checkbox" x-model="autoRedirect" class="accent-[#00F5FF]">
                  AUTO-REDIRECT TO HISTORY
                </label>
                <div x-show="autoRedirect && countdown > 0"
                     class="font-mono text-[10px] text-white/25 text-center"
                     x-text="'Redirecting in ' + countdown + 's…'"></div>
              </div>

              <!-- ERROR state -->
              <div x-show="stage === 'error'" class="mt-2">
                <div class="font-mono text-xs text-[#FF006E] border border-[#FF006E]/30 bg-[#FF006E]/8 px-3 py-2"
                     x-text="pipelineError || 'Pipeline error. Check server logs.'"></div>
              </div>

            </div>
          </template>

        </div>
      </div>

      <!-- ── BLADE DEFECT MAP (appears below form+progress after complete) ── -->
      <template x-if="stage === 'complete' && bladeMapReady">
        <div class="mt-8">

          <!-- Section label -->
          <div class="flex items-center gap-3 mb-5">
            <div class="h-px flex-1 bg-[#00F5FF]/15"></div>
            <span class="font-mono text-[10px] text-[#00F5FF]/60 uppercase tracking-widest">BLADE DEFECT MAP</span>
            <div class="h-px flex-1 bg-[#00F5FF]/15"></div>
          </div>

          <!-- Blade selector tabs (if multiple blades) -->
          <template x-if="bladeMapBlades.length > 1">
            <div class="flex gap-1 mb-4">
              <template x-for="b in bladeMapBlades" :key="b">
                <button class="font-mono text-[10px] uppercase tracking-widest px-3 py-1.5 border transition-colors"
                        :class="selectedBlade === b
                          ? 'border-[#00F5FF] text-[#00F5FF] bg-[#00F5FF]/[0.08]'
                          : 'border-white/10 text-white/35 hover:text-white/60'"
                        @click="selectedBlade = b"
                        x-text="'BLADE ' + b"></button>
              </template>
            </div>
          </template>

          <!-- Grid for selected blade -->
          <template x-if="bladeMapData[selectedBlade]">
            <div>

              <!-- Blade header row -->
              <div class="flex items-baseline justify-between mb-3">
                <div>
                  <span class="font-bebas text-2xl bg-gradient-to-r from-[#00F5FF] to-[#7B2FFF] bg-clip-text text-transparent"
                        x-text="'BLADE ' + selectedBlade + ' — ' + bladeMapTurbineId"></span>
                  <span class="font-mono text-[10px] text-white/35 ml-3 uppercase tracking-wider"
                        x-text="'12 sectors · ' + (bladeMapData[selectedBlade].total_defects || 0) + ' defects'"></span>
                </div>
                <div x-show="bladeMapData[selectedBlade].max_category >= 3">
                  <span class="font-mono text-[10px] text-[#FF006E] border border-[#FF006E]/30 bg-[#FF006E]/8 px-2 py-1 uppercase tracking-wider"
                        x-text="'⚠ MAX CAT ' + bladeMapData[selectedBlade].max_category"></span>
                </div>
              </div>

              <!-- Chordwise column headers -->
              <div class="grid gap-1 mb-1" style="grid-template-columns: 70px repeat(4, 1fr);">
                <div></div>
                <template x-for="col in bmColumns" :key="col.code">
                  <div class="text-center">
                    <div class="font-mono text-[8px] text-white/25 uppercase tracking-wider" x-text="col.code"></div>
                    <div class="font-mono text-[9px] text-white/50 uppercase tracking-wide" x-text="col.label"></div>
                  </div>
                </template>
              </div>

              <!-- Grid rows -->
              <template x-for="row in bmRows" :key="row.key">
                <div class="grid gap-1 mb-1" style="grid-template-columns: 70px repeat(4, 1fr);">

                  <!-- Spanwise row label -->
                  <div class="flex flex-col justify-center border-r border-white/[0.06] pr-2">
                    <div class="font-mono text-[8px] text-white/25 uppercase" x-text="row.code"></div>
                    <div class="font-mono text-[10px] text-white/60 uppercase tracking-wide" x-text="row.label"></div>
                    <div class="font-mono text-[8px] text-white/20 mt-0.5" x-text="row.range"></div>
                  </div>

                  <!-- 4 zone cells per row -->
                  <template x-for="col in bmColumns" :key="col.zone">
                    <div x-data="{ cell: bmGetCell(col.zone, row.pos) }"
                         class="bm-cell"
                         :data-cat="cell.worst_cat">
                      <div class="bm-corners">
                        <span class="tl"></span><span class="tr"></span>
                        <span class="bl"></span><span class="br"></span>
                      </div>

                      <!-- Zone code + cat pill -->
                      <div class="flex items-center justify-between z-10 relative">
                        <span class="font-mono text-[8px] text-white/60 uppercase"
                              x-text="col.zone + '/' + row.pos.slice(0,3).toUpperCase()"></span>
                        <span class="font-mono text-[7px] px-1 font-semibold uppercase"
                              :style="bmCatPillStyle(cell.worst_cat)"
                              x-text="'C' + cell.worst_cat"
                              x-show="cell.count > 0"></span>
                      </div>

                      <!-- Defect count marker -->
                      <div class="flex items-center justify-center flex-1 py-1">
                        <div class="bm-marker"
                             :class="cell.count === 0 ? 'empty' : (cell.worst_cat >= 4 ? 'cat4' : cell.worst_cat === 3 ? 'cat3' : cell.worst_cat >= 1 ? 'cat12' : 'cat0')"
                             x-text="cell.count"></div>
                      </div>

                      <!-- Footer: primary defect type -->
                      <div class="font-mono text-[7px] text-white/30 uppercase truncate z-10 relative"
                           x-text="cell.defect_types[0] || 'NOMINAL'"></div>
                    </div>
                  </template>

                </div>
              </template>

              <!-- Legend -->
              <div class="flex items-center gap-3 mt-4 border border-white/[0.06] px-4 py-3 bg-white/[0.015]">
                <span class="font-mono text-[9px] text-[#00F5FF]/60 uppercase tracking-widest mr-2">SEVERITY</span>
                <template x-for="leg in bmLegend" :key="leg.cat">
                  <div class="flex items-center gap-1.5">
                    <div class="w-3 h-3 rounded-[1px] flex-shrink-0"
                         :style="'background:' + leg.color + '; box-shadow: 0 0 8px -2px ' + leg.color"></div>
                    <span class="font-mono text-[8px] uppercase tracking-wide"
                          :style="'color:' + leg.color"
                          x-text="leg.label"></span>
                  </div>
                </template>
              </div>

            </div>
          </template>

        </div>
      </template>

    </div>

    <!-- HISTORY TAB -->
    <div x-show="activeTab==='history'">

      <!-- Header row -->
      <div class="flex items-center justify-between mb-6">
        <h2 class="font-mono text-xs uppercase tracking-widest text-white/40">RECENT INSPECTIONS // LAST 30 DAYS</h2>
        <button @click="loadHistory()" class="font-mono text-[10px] text-white/30 hover:text-white/60 uppercase tracking-wider transition-colors">
          ↺ REFRESH
        </button>
      </div>

      <!-- Loading state -->
      <template x-if="!historyLoaded">
        <div class="border border-white/[0.06] py-16 text-center">
          <div class="font-mono text-[10px] text-white/20 uppercase tracking-widest pulse">LOADING…</div>
        </div>
      </template>

      <!-- Empty state -->
      <template x-if="jobs.length === 0 && historyLoaded">
        <div class="border border-white/[0.06] py-16 text-center">
          <div class="font-mono text-[10px] text-white/20 uppercase tracking-widest">NO REPORTS GENERATED YET</div>
        </div>
      </template>

      <!-- Table -->
      <template x-if="jobs.length > 0">
        <div class="overflow-x-auto">
          <table class="w-full border-collapse">
            <thead>
              <tr style="background: rgba(0,245,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.08);">
                <th class="font-mono text-[9px] text-white/25 uppercase tracking-widest text-left py-2 px-3">DATE</th>
                <th class="font-mono text-[9px] text-white/25 uppercase tracking-widest text-left py-2 px-3">TURBINE ID</th>
                <th class="font-mono text-[9px] text-white/25 uppercase tracking-widest text-left py-2 px-3">SITE</th>
                <th class="font-mono text-[9px] text-white/25 uppercase tracking-widest text-left py-2 px-3">STATUS</th>
                <th class="font-mono text-[9px] text-white/25 uppercase tracking-widest text-right py-2 px-3">DEFECTS</th>
                <th class="font-mono text-[9px] text-white/25 uppercase tracking-widest text-right py-2 px-3">COST</th>
                <th class="font-mono text-[9px] text-white/25 uppercase tracking-widest text-right py-2 px-3">DOWNLOAD</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="job in jobs" :key="job.job_id">
                <tr style="border-bottom: 1px solid var(--border);"
                    class="transition-colors"
                    @mouseenter="$el.style.background='rgba(255,255,255,0.03)'"
                    @mouseleave="$el.style.background=''">

                  <!-- DATE -->
                  <td class="py-2.5 px-3 font-mono text-xs text-white/35 whitespace-nowrap"
                      x-text="formatDate(job.created_at)"></td>

                  <!-- TURBINE ID -->
                  <td class="py-2.5 px-3 font-mono text-xs uppercase"
                      style="color: #00F5FF;"
                      x-text="job.turbine_id || '—'"></td>

                  <!-- SITE -->
                  <td class="py-2.5 px-3 text-sm text-white/70"
                      x-text="job.site_name || '—'"></td>

                  <!-- STATUS -->
                  <td class="py-2.5 px-3">
                    <span class="font-mono text-[10px] px-2 py-0.5 border"
                          :class="{
                            'text-[#00FF88] border-[#00FF88]/25 bg-[#00FF88]/[0.08]': job.stage === 'complete',
                            'text-[#FF006E] border-[#FF006E]/25 bg-[#FF006E]/[0.08]': job.stage === 'error' || job.stage === 'failed',
                            'text-[#FFB800] border-[#FFB800]/25 bg-[#FFB800]/[0.08] pulse': job.stage !== 'complete' && job.stage !== 'error' && job.stage !== 'failed',
                          }"
                          x-text="job.stage === 'complete' ? 'COMPLETE' : (job.stage === 'error' || job.stage === 'failed') ? 'FAILED' : 'RUNNING'">
                    </span>
                  </td>

                  <!-- DEFECTS -->
                  <td class="py-2.5 px-3 font-mono text-xs text-white/50 text-right"
                      x-text="job.stage === 'complete' && job.defect_count != null ? job.defect_count : '–'"></td>

                  <!-- COST -->
                  <td class="py-2.5 px-3 font-mono text-xs text-white/50 text-right"
                      x-text="job.stage === 'complete' && job.total_cost_usd ? '$' + parseFloat(job.total_cost_usd).toFixed(2) : '–'"></td>

                  <!-- DOWNLOAD -->
                  <td class="py-2.5 px-3 text-right">
                    <template x-if="job.stage === 'complete'">
                      <button class="action-btn sm" @click="downloadReport(job.job_id)">⬇ PDF</button>
                    </template>
                    <template x-if="job.stage !== 'complete'">
                      <span class="font-mono text-[10px] text-white/20">–</span>
                    </template>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </template>

    </div>

  </main>

  <!-- ── ALPINE APP() ─────────────────────────────────────────────────── -->
  <script>
    function app() {
      return {
        // ── Auth ──
        token: localStorage.getItem('bdda_token') || null,
        username: localStorage.getItem('bdda_username') || '',

        // ── Tab navigation ──
        activeTab: 'new-inspection',

        // ── Form sections collapse state ──
        sections: {
          identity:    true,
          details:     true,
          environment: true,
          notes:       true,
          upload:      true,
        },

        // ── File upload state ──
        fileSelected: false,
        fileName: '',
        fileSize: '',

        // ── Pipeline / job state ──
        jobId: null,
        stage: null,
        progress: 0,
        message: '',
        totalImages: null,
        flaggedImages: null,
        criticalFindings: null,
        isPolling: false,
        downloadAvailable: false,
        autoRedirect: false,
        countdown: 3,
        pipelineError: null,
        submitting: false,
        _pollTimer: null,

        // ── Stage definitions ──
        stages: [
          { key: 'ingesting',         label: 'INGEST IMAGES' },
          { key: 'triaging',          label: 'TRIAGE \u2014 claude-opus-4-6' },
          { key: 'classifying',       label: 'CLASSIFY \u2014 claude-opus-4-6' },
          { key: 'analyzing',         label: 'ANALYZE \u2014 claude-opus-4-6' },
          { key: 'generating_report', label: 'BUILD PDF' },
          { key: 'complete',          label: 'COMPLETE' },
        ],
        STAGE_ORDER: ['ingesting','triaging','classifying','analyzing','generating_report','complete'],

        // ── History ──
        jobs: [],
        historyLoaded: false,

        // ── Blade map ──
        bladeMapReady: false,
        bladeMapData: {},
        bladeMapBlades: [],
        bladeMapTurbineId: '',
        selectedBlade: '1',

        bmColumns: [
          { zone: 'LE', code: 'C01', label: 'LEADING EDGE' },
          { zone: 'PS', code: 'C02', label: 'PRESSURE SIDE' },
          { zone: 'SS', code: 'C03', label: 'SUCTION SIDE' },
          { zone: 'TE', code: 'C04', label: 'TRAILING EDGE' },
        ],
        bmRows: [
          { pos: 'Root', key: 'root', code: 'R01', label: 'ROOT',     range: '0 – 30%' },
          { pos: 'Mid',  key: 'mid',  code: 'R02', label: 'MID-SPAN', range: '30 – 70%' },
          { pos: 'Tip',  key: 'tip',  code: 'R03', label: 'TIP',      range: '70 – 100%' },
        ],
        bmLegend: [
          { cat: 0, color: '#00FF88', label: 'CAT 0 · NOMINAL' },
          { cat: 1, color: '#FFB800', label: 'CAT 1–2 · MINOR' },
          { cat: 3, color: '#FF006E', label: 'CAT 3 · MAJOR' },
          { cat: 4, color: '#FF3333', label: 'CAT 4 · CRITICAL' },
        ],

        // ── Init ──
        async init() {
          if (!this.token) { window.location.href = '/login'; return; }
          if (!this.username) {
            try {
              const p = JSON.parse(atob(this.token.split('.')[1]));
              this.username = p.sub || '';
              localStorage.setItem('bdda_username', this.username);
            } catch {}
          }
          this.$nextTick(() => {
            const dateInput = document.querySelector('input[name="inspection_date"]');
            if (dateInput && !dateInput.value) {
              dateInput.value = new Date().toISOString().split('T')[0];
            }
          });
        },

        // ── Auth ──
        logout() {
          localStorage.removeItem('bdda_token');
          localStorage.removeItem('bdda_username');
          window.location.href = '/login';
        },

        // ── API wrapper (Bearer injection + X-New-Token silent refresh + 401 redirect) ──
        async apiFetch(path, opts = {}) {
          const token = localStorage.getItem('bdda_token');
          if (!token) { this.logout(); return null; }
          const headers = { 'Authorization': `Bearer ${token}`, ...(opts.headers || {}) };
          const res = await fetch(path, { ...opts, headers });
          const newToken = res.headers.get('X-New-Token');
          if (newToken) { localStorage.setItem('bdda_token', newToken); this.token = newToken; }
          if (res.status === 401) { this.logout(); return null; }
          return res;
        },

        // ── Stage helpers ──
        stageIndex() { return this.STAGE_ORDER.indexOf(this.stage); },
        isDone(i)    { return this.stageIndex() > i && this.stage !== 'error'; },
        isActive(i)  { return this.stageIndex() === i && this.stage !== 'error'; },
        isFailed(i)  { return this.stage === 'error' && this.stageIndex() === i; },
        isPending(i) { return this.stageIndex() < i; },

        // ── Date formatter ──
        formatDate(iso) {
          if (!iso) return '\u2014';
          const d = new Date(iso);
          const mon = d.toLocaleDateString('en-GB', { month: 'short' }).toUpperCase();
          const day = String(d.getDate()).padStart(2, '0');
          const time = d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
          return `${mon} ${day} \u00b7 ${time}`;
        },

        // ── File handling ──
        handleFileChange(e) {
          const file = e.target.files[0];
          if (!file) return;
          this.fileSelected = true;
          this.fileName = file.name;
          this.fileSize = (file.size / 1024 / 1024).toFixed(1) + ' MB';
        },

        handleDrop(e) {
          const file = e.dataTransfer.files[0];
          if (!file) return;
          const input = document.getElementById('fileInput');
          const dt = new DataTransfer();
          dt.items.add(file);
          input.files = dt.files;
          this.fileSelected = true;
          this.fileName = file.name;
          this.fileSize = (file.size / 1024 / 1024).toFixed(1) + ' MB';
        },

        // ── Submit ──
        async submit() {
          const fileInput = document.getElementById('fileInput');
          if (!fileInput.files.length) return;

          this.submitting = true;
          this.jobId = null;
          this.stage = null;
          this.progress = 0;
          this.message = '';
          this.pipelineError = null;
          this.downloadAvailable = false;

          const formData = new FormData(document.querySelector('form'));
          if (!formData.get('inspection_date')) {
            formData.set('inspection_date', new Date().toISOString().split('T')[0]);
          }

          try {
            const res = await this.apiFetch('/api/upload', { method: 'POST', body: formData });
            if (!res || !res.ok) {
              const err = await res?.json().catch(() => ({ detail: 'Upload failed' }));
              throw new Error(err.detail || 'Upload failed');
            }
            const data = await res.json();
            this.jobId = data.job_id;
            this.totalImages = data.image_count || null;
            this.startPolling(data.job_id);
          } catch (err) {
            this.pipelineError = err.message;
            this.stage = 'error';
          } finally {
            this.submitting = false;
          }
        },

        // ── Polling ──
        startPolling(jobId) {
          this.stopPolling();
          this.isPolling = true;
          this._pollTimer = setInterval(() => this.pollOnce(jobId), 2000);
          this.pollOnce(jobId);
        },

        stopPolling() {
          if (this._pollTimer) { clearInterval(this._pollTimer); this._pollTimer = null; }
          this.isPolling = false;
        },

        async pollOnce(jobId) {
          try {
            const res = await this.apiFetch(`/api/status/${jobId}`);
            if (!res || !res.ok) return;
            const s = await res.json();
            this.stage = s.stage;
            this.progress = s.progress >= 0 ? s.progress : 0;
            this.message = s.message || '';
            this.totalImages = s.total_images || this.totalImages;
            this.flaggedImages = s.flagged_images || null;
            this.criticalFindings = s.critical_findings || null;

            if (s.stage === 'complete') {
              this.stopPolling();
              this.downloadAvailable = true;
              this.progress = 100;
              this.loadHistory();
              this.loadBladeMap(jobId);
              if (this.autoRedirect) {
                this.countdown = 3;
                const tick = setInterval(() => {
                  this.countdown--;
                  if (this.countdown <= 0) {
                    clearInterval(tick);
                    this.activeTab = 'history';
                  }
                }, 1000);
              }
            }
            if (s.stage === 'error' || s.stage === 'failed' || s.stage === 'cost_limit_exceeded') {
              this.stage = 'error';
              this.pipelineError = s.error || s.message || 'Pipeline failed.';
              this.stopPolling();
            }
          } catch {
            // Network error — keep polling
          }
        },

        // ── Download (blob fetch — JWT-safe) ──
        async downloadReport(jobId) {
          const res = await this.apiFetch(`/api/download/${jobId}`);
          if (!res || !res.ok) return;
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `inspection_${jobId}.pdf`;
          a.click();
          URL.revokeObjectURL(url);
        },

        // ── History ──
        async loadHistory() {
          try {
            const res = await this.apiFetch('/api/jobs');
            if (!res || !res.ok) return;
            this.jobs = await res.json();
            this.historyLoaded = true;
          } catch {
            this.historyLoaded = true;
          }
        },

        // ── Blade map ──
        async loadBladeMap(jobId) {
          try {
            const res = await this.apiFetch(`/api/blademap/${jobId}`);
            if (!res || !res.ok) return;
            const data = await res.json();
            if (!data.ready) return;
            this.bladeMapData    = data.blades || {};
            this.bladeMapBlades  = Object.keys(data.blades || {}).sort();
            this.bladeMapTurbineId = data.turbine_id || '';
            this.selectedBlade   = this.bladeMapBlades[0] || '1';
            this.bladeMapReady   = true;
          } catch {}
        },

        bmGetCell(zone, pos) {
          const blade = this.bladeMapData[this.selectedBlade];
          if (!blade) return { count: 0, worst_cat: 0, defect_types: [] };
          return blade.grid[`${zone}/${pos}`] || { count: 0, worst_cat: 0, defect_types: [] };
        },

        bmCatPillStyle(cat) {
          const colors = { 0: '#00FF88', 1: '#FFB800', 2: '#FFB800', 3: '#FF006E', 4: '#FF3333' };
          const c = colors[cat] || '#fff';
          return `background: ${c}; color: #050510; border-radius: 1px;`;
        },
      }
    }
  </script>

</body>
</html>
