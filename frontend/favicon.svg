<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d2044"/>
    </linearGradient>
    <linearGradient id="blade1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0077b6"/>
    </linearGradient>
    <linearGradient id="blade2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#48cae4"/>
      <stop offset="100%" style="stop-color:#0096c7"/>
    </linearGradient>
    <linearGradient id="blade3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#90e0ef"/>
      <stop offset="100%" style="stop-color:#00b4d8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="15.5" fill="url(#bg)" stroke="#00d4ff" stroke-width="0.5" opacity="0.9"/>

  <!-- Tower -->
  <polygon points="15.2,29 16.8,29 16.3,16 15.7,16" fill="#1e3a5f" stroke="#00d4ff" stroke-width="0.3"/>

  <!-- Hub center -->
  <circle cx="16" cy="15.5" r="1.5" fill="#00d4ff" filter="url(#glow)"/>
  <circle cx="16" cy="15.5" r="0.7" fill="#0a1628"/>

  <!-- Blade 1 — pointing upper-left -->
  <polygon points="16,14 7,9 9,12" fill="url(#blade1)" opacity="0.95" filter="url(#glow)"/>

  <!-- Blade 2 — pointing upper-right -->
  <polygon points="17,15.5 25,8 23,11.5" fill="url(#blade2)" opacity="0.95" filter="url(#glow)"/>

  <!-- Blade 3 — pointing down -->
  <polygon points="15,16.5 14,26 17,25" fill="url(#blade3)" opacity="0.95" filter="url(#glow)"/>

  <!-- Subtle outer glow ring -->
  <circle cx="16" cy="16" r="15" fill="none" stroke="#00d4ff" stroke-width="0.3" opacity="0.3"/>
</svg>
